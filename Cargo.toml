[package]
name = "digikam-browse"
version = "0.1.0"
edition = "2021"
description = "Read-only web backend for browsing a Digikam photo database"
license = "Unlicense"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "fs"] }
hyper = "1"
hyper-util = { version = "0.1", features = ["server-auto", "tokio"] }

# Optional TLS (HTTPS + HTTP/2) with an auto-generated self-signed cert (--tls).
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12", "logging"] }
rcgen = { version = "0.13", default-features = false, features = ["ring", "crypto"] }

rusqlite = { version = "0.32", features = ["bundled", "trace"] }
r2d2 = "0.8"
r2d2_sqlite = "0.25"

serde = { version = "1", features = ["derive"] }
serde_json = "1"
maud = { version = "0.26", features = ["axum"] }

clap = { version = "4", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
thiserror = "2"
mime_guess = "2"
urlencoding = "2"

[profile.release]
opt-level = 3
